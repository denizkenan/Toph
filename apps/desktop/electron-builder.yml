appId: studio.yourtechbud.toph
productName: Toph
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: ../../assets/app-icons

files:
  - out/**
  - drizzle/**
  - package.json

asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/.pnpm/better-sqlite3*/node_modules/better-sqlite3/**

mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  icon: icon.icns
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: Toph needs microphone access to capture dictation audio.
    NSAppleEventsUsageDescription: Toph uses Apple Events to paste completed dictation into the focused app.
  target:
    - dmg
    - zip

win:
  icon: icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

linux:
  category: Utility
  icon: icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

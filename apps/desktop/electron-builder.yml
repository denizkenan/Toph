appId: com.toph.desktop
productName: Toph
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: ../../assets/app-icons

files:
  - out/**
  - drizzle/**
  - package.json

asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/.pnpm/better-sqlite3*/node_modules/better-sqlite3/**

mac:
  category: public.app-category.productivity
  icon: icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  icon: icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

linux:
  category: Utility
  icon: icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

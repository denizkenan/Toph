name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build signed macOS artifacts
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: macos-14
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build signed and notarized macOS artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
        run: pnpm run dist:mac

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toph-macos
          path: |
            apps/desktop/dist/Toph-*-mac-arm64.dmg
            apps/desktop/dist/Toph-*-mac-arm64.zip
            apps/desktop/dist/Toph-*-mac-x64.dmg
            apps/desktop/dist/Toph-*-mac-x64.zip
            apps/desktop/dist/Toph-*-mac-arm64.dmg.blockmap
            apps/desktop/dist/Toph-*-mac-arm64.zip.blockmap
            apps/desktop/dist/Toph-*-mac-x64.dmg.blockmap
            apps/desktop/dist/Toph-*-mac-x64.zip.blockmap
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            apps/desktop/dist/Toph-*-mac-arm64.dmg \
            apps/desktop/dist/Toph-*-mac-arm64.zip \
            apps/desktop/dist/Toph-*-mac-x64.dmg \
            apps/desktop/dist/Toph-*-mac-x64.zip \
            apps/desktop/dist/Toph-*-mac-arm64.dmg.blockmap \
            apps/desktop/dist/Toph-*-mac-arm64.zip.blockmap \
            apps/desktop/dist/Toph-*-mac-x64.dmg.blockmap \
            apps/desktop/dist/Toph-*-mac-x64.zip.blockmap \
            --clobber
